spring.application.name=backend
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/tms_project_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Force JSON responses - prevents XML being returned
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.default-content-type=application/json
spring.mvc.producesmediatypes=application/json

# Jackson - serialize dates as strings not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# JWT
app.jwt.secret=F2A1D9C8B7E6A5D4C3B2A19087654321F1E2D3C4B5A6978877665544332211FFE
app.jwt.issuer=tmsapplication
app.jwt.expiration=7200000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
